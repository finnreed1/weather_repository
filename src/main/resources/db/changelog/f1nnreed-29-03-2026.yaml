databaseChangeLog:
  - changeSet:
      id: create-table-users
      author: f1nnreed
      preConditions:
        - onFail: MARK_RAN
        - not:
            tableExists:
              tableName: users
      changes:
        - createTable:
            tableName: users
            columns:
              - column:
                  name: id
                  type: integer
                  autoIncrement: true
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: login
                  type: varchar(50)
                  constraints:
                    nullable: false
                    unique: true
              - column:
                  name: password
                  type: varchar(255)
                  constraints:
                    nullable: false
  - changeSet:
      id: create-table-locations
      author: f1nnreed
      preConditions:
        - onFail: MARK_RAN
        - not:
            tableExists:
              tableName: locations
      changes:
        - createTable:
            tableName: locations
            columns:
              - column:
                  name: id
                  type: int
                  autoIncrement: true
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: name
                  type: varchar(50)
                  constraints:
                    nullable: false
              - column:
                  name: userid
                  type: int
                  constraints:
                    nullable: false
              - column:
                  name: latitude
                  type: decimal
                  constraints:
                    nullable: false
              - column:
                  name: longitude
                  type: decimal
                  constraints:
                    nullable: false
        - addForeignKeyConstraint:
            baseTableName: locations
            baseColumnNames: userid
            referencedTableName: users
            referencedColumnNames: id
            constraintName: fk_locations_users
            onDelete: CASCADE
  - changeSet:
      id: create-table-sessions
      author: f1nnreed
      preConditions:
        - onFail: MARK_RAN
        - not:
            tableExists:
              tableName: sessions
      changes:
        - createTable:
            tableName: sessions
            columns:
              - column:
                  name: id
                  type: uuid
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: userid
                  type: int
                  constraints:
                    nullable: false
              - column:
                  name: expiresat
                  type: datetime
                  constraints:
                    nullable: false
        - addForeignKeyConstraint:
            baseTableName: sessions
            baseColumnNames: userid
            referencedTableName: users
            referencedColumnNames: id
            constraintName: fk_sessions_users
            onDelete: CASCADE